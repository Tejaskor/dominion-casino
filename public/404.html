<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>SUPREX — Social Casino</title>
    <!--
      Single Page Apps for GitHub Pages
      https://github.com/rafgraph/spa-github-pages
      GitHub Pages serves this 404.html for any path it doesn't recognise
      (e.g. a deep link or page refresh on /dominion-casino/games). This script
      rewrites the URL into a query string and redirects to the app's index,
      where the snippet in index.html restores the real route for React Router.
    -->
    <script type="text/javascript">
      // For project pages served from https://user.github.io/<repo>/ keep the
      // first path segment (the repo name) and turn the rest into a query.
      var pathSegmentsToKeep = 1;

      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
